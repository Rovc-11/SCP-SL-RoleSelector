name: Build and Package Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release

      - name: Rename and Prepare Artifact
        run: |
          mkdir -p dist
          # ProjeIsmi.dll kısmını kendi gerçek proje dosya isminle değiştirmeyi unutma!
          cp bin/Release/net48/ProjeIsmi.dll dist/OnBirsRoleSelector.dll

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OnBirsRoleSelector
          path: dist/OnBirsRoleSelector.dll